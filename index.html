<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cake Forge - Advanced Kitchen Hub</title>
    <style>
        :root {
            --bg-dark: #121212;
            --surface: #1e1e1e;
            --surface-accent: #2a2a2a;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --brand-green: #00b0ff; 
            --alert-amber: #ff9100;
            --alert-red: #ff3d00;
            --success: #00e676;
            --border: #383838;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        header {
            background-color: var(--surface);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 2px solid var(--surface-accent);
            flex-shrink: 0;
        }

        .brand h1 { font-size: 1.3rem; color: var(--brand-green); letter-spacing: 1px; }
        .brand p { font-size: 0.75rem; color: var(--text-muted); }
        .header-actions { display: flex; align-items: center; gap: 15px; }
        #clock-container { text-align: right; }
        #clock { font-size: 1.6rem; font-weight: bold; font-variant-numeric: tabular-nums; }
        #date { font-size: 0.75rem; color: var(--text-muted); }

        main {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            width: 100%;
        }

        @media (min-width: 768px) {
            main { grid-template-columns: 1fr 1.1fr; }
        }

        .panel {
            background-color: var(--surface);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 5px;
        }

        h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .scrollable { width: 100%; }

        /* TIMERS */
        .timer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .timer-card { background: var(--surface-accent); padding: 12px; border-radius: 6px; border-left: 4px solid var(--text-muted); }
        .timer-card.active { border-left-color: var(--brand-green); }
        .timer-card.alarm { border-left-color: var(--alert-red); animation: flash-red 1s infinite alternate; }

        @keyframes flash-red {
            from { background-color: var(--surface-accent); }
            to { background-color: rgba(255, 61, 0, 0.2); }
        }

        .timer-title { font-weight: bold; font-size: 0.85rem; }
        .timer-time { font-size: 1.3rem; font-weight: bold; font-variant-numeric: tabular-nums; margin: 4px 0; }
        .timer-controls button {
            background: #333; color: white; border: none; padding: 6px 10px;
            font-size: 0.75rem; border-radius: 4px; cursor: pointer; margin-right: 4px; margin-top: 4px;
        }

        /* TEMPERATURE ROW */
        .temp-row { background: var(--surface-accent); padding: 12px 15px; border-radius: 6px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .temp-controls { display: flex; align-items: center; gap: 12px; }
        .btn-temp { background: #333; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .temp-display { font-size: 1.4rem; font-weight: bold; min-width: 75px; text-align: center; font-variant-numeric: tabular-nums; }

        .deviation-panel { background-color: rgba(255, 145, 0, 0.1); border: 1px solid var(--alert-amber); border-radius: 6px; padding: 10px; margin-bottom: 10px; display: none; }
        .deviation-panel textarea { width: 100%; background: #121212; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 4px; resize: none; font-size: 0.85rem; }

        /* CHECKLIST */
        .checklist-item { display: flex; align-items: center; padding: 12px; background: var(--surface-accent); margin-bottom: 8px; border-radius: 6px; cursor: pointer; }
        .checklist-item.checked { border-left: 4px solid var(--success); opacity: 0.6; }
        .checkbox-mock { width: 22px; height: 22px; border: 2px solid #555; border-radius: 4px; margin-right: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold;}
        .checklist-item.checked .checkbox-mock { border-color: var(--success); background-color: var(--success); color: black; }
        .checklist-item.checked .checkbox-mock::after { content: "✓"; font-size: 0.85rem; }
        .task-text { font-size: 0.85rem; flex-grow: 1; pointer-events: none; }
        .timestamp { font-size: 0.75rem; color: var(--text-muted); font-variant-numeric: tabular-nums; }

        /* LEDGER SPREADSHEET */
        .spreadsheet-container { width: 100%; overflow-x: auto; border: 1px solid var(--border); border-radius: 4px; margin-top: 5px; }
        table.ledger { width: 100%; border-collapse: collapse; font-size: 0.85rem; text-align: left; min-width: 500px; }
        table.ledger th { background-color: #252525; color: var(--text-main); padding: 10px 8px; font-weight: 600; border-bottom: 2px solid var(--border); border-right: 1px solid var(--border); }
        table.ledger td { padding: 10px 8px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); background-color: var(--surface); }
        table.ledger tr:nth-child(even) td { background-color: #222; }
        table.ledger td[contenteditable="true"]:focus { background-color: #2d3d4d; outline: 1px solid var(--brand-green); }
        .expired-row td { background-color: rgba(255, 61, 0, 0.15) !important; color: #ff8a80; }
